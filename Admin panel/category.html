<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Page</title>
    <link rel="stylesheet" href="./css/styledb.css" />
    <link rel="stylesheet" href="./css/stylecategory.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="home">
          <i class="fa-solid fa-bars" id="menu"></i>
        </div>
        <div class="timer">
          <span id="hour">00</span> : <span id="min">00</span> :
          <span id="sec">00</span> : <span id="time">AM</span>
        </div>
      </header>

      <aside>
        <div class="profile">
          <img src="./img/profile.jpg" alt="" />
        </div>
        <h3>Admin</h3>
        <ul>
          <li>
            <a href="./dashboard.html">
              <i class="fa-solid fa-house" style="color: white"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
             <a href="./category.html">
               <i class="fa-solid fa-list" style="color: white"></i>
              <span>Category</span>
            </a>
          </li>
          <li>
             <a href="./products.html">
               <i class="fa-solid fa-bag-shopping" style="color: white"></i>
              <span>Products</span>
            </a>
          </li>
          <li>
             <a href="./customer.html">
              <i class="fa-solid fa-users" style="color: white"></i>
              <span>Customer</span>
            </a>
          </li>
          <li>
             <a href="javascript:void(0)" onclick="logout()">
              <i class="fa-solid fa-arrow-right-from-bracket"style="color: white"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>

        <div class="icons">
          <a href="https://www.instagram.com/"
            ><i class="fa-brands fa-instagram"></i
          ></a>
          <a href="https://x.com/"><i class="fa-brands fa-twitter"></i></a>
          <a href="https://www.facebook.com/"
            ><i class="fa-brands fa-facebook-f"></i
          ></a>
          <a href="https://in.linkedin.com/"
            ><i class="fa-brands fa-square-linkedin"></i
          ></a>
        </div>
      </aside>

      <main>
       <form id="categoryForm">
          <h3>Category</h3>
          <input type="hidden" id="categoryid" />

          <input type="text" placeholder="Product category" id="catgry" />
          <span id="catgryerr" class="err"></span>

          <button type="submit" id="submitbtn">Submit</button>
          <button type="submit" id="updatebtn" style="display: none">
            Update
          </button>
        </form>

        <table>
          <thead>
            <tr>
              <th>S.no</th>
              <th>Category Id</th>
              <th>Category Name</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="data"></tbody>
        </table>
      </main>

      <footer>
        <p>©&nbsp;<span id="year"></span>&nbsp;Kamali Muruganantham. All rights reserved.</p>
      </footer>
    </div>
    <script src="./js/category.js"></script>
    <script src="./js/Footer.js"></script>
  </body>
</html>
