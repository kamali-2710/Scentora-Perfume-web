<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Page</title>
    <link rel="stylesheet" href="./css/styledb.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="home">
          <i class="fa-solid fa-bars" id="menu"></i>
        </div>

        <div class="timer">
          <span id="hour">00</span> : <span id="min">00</span> :
          <span id="sec">00</span> : <span id="time">AM</span>
        </div>
      </header>

      <aside>
        <div class="profile">
          <img src="./img/profile.jpg" alt="" />
        </div>
        <h3>Admin</h3>
        <ul>
          <li>
            <a href="./dashboard.html">
              <i class="fa-solid fa-house" style="color: white"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
             <a href="./category.html">
               <i class="fa-solid fa-list" style="color: white"></i>
              <span>Category</span>
            </a>
          </li>
          <li>
             <a href="./products.html">
               <i class="fa-solid fa-bag-shopping" style="color: white"></i>
              <span>Products</span>
            </a>
          </li>
          <li>
             <a href="./customer.html">
              <i class="fa-solid fa-users" style="color: white"></i>
              <span>Customer</span>
            </a>
          </li>
          <li>
             <a href="javascript:void(0)" onclick="logout()">
              <i class="fa-solid fa-arrow-right-from-bracket"style="color: white"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>

        <div class="icons">
          <a href="https://www.instagram.com/"
            ><i class="fa-brands fa-instagram"></i
          ></a>
          <a href="https://x.com/"><i class="fa-brands fa-twitter"></i></a>
          <a href="https://www.facebook.com/"
            ><i class="fa-brands fa-facebook-f"></i
          ></a>
          <a href="https://in.linkedin.com/"
            ><i class="fa-brands fa-square-linkedin"></i
          ></a>
        </div>
      </aside>

      <main>
        <div class="page-content dashboard-page">
          <h3>Dashboard</h3>
          <div class="main-box">
            <div class="box1 box">
              <h2 id="totalProducts"></h2>
              <div class="div">
                <p>Total Product</p>
                <i class="fa-solid fa-box card-icon"></i>
              </div>
              <div class="moreinfo">
              <a href="./products.html">More Info <i class="fa-solid fa-circle-chevron-right"></i></a></div>
            </div>
            <div class="box2 box">
              <h2 id="totalCategories"></h2>
              <div class="div">
                <p>Total Category</p>
                <i class="fa-solid fa-layer-group card-icon"></i>
              </div>
              <div class="moreinfo">
              <a href="./category.html">More Info <i class="fa-solid fa-circle-chevron-right"></i></a></div>
            </div>
            <div class="box3 box">
              <h2 id="totalUsers"></h2>
              <div class="div">
                <p>Total Registration</p>
                <i class="fa-solid fa-users card-icon"></i>
              </div>
              <div class="moreinfo">
              <a href="./customer.html">More Info <i class="fa-solid fa-circle-chevron-right"></i></a></div>
            </div>
            <div class="box3 box">
              <h2 id="totalStock"></h2>
              <div class="div">
                <p>Total Stock</p>
                <i class="fa-solid fa-chart-line card-icon"></i>
              </div>
              <div class="moreinfo">
              <a href="">More Info <i class="fa-solid fa-circle-chevron-right"></i></a></div>
            </div>
          </div>
        </div>
      </main>

      <footer>
       <p>©&nbsp;<span id="year"></span>&nbsp;Kamali Muruganantham. All rights reserved.</p>
      </footer>
    </div>
    <script src="./js/dashboard.js"></script>
    <script src="./js/Footer.js"></script>
  </body>
</html>
